# frago Knowledge Book — Topic Index
# Categories: must (替代), better (偏好), available (效率)

# 替代类 — 不遵守会出错
- name: must-browser-search
  category: must
  brief: "搜索用 {{frago_launcher}} chrome navigate google，禁止 WebSearch"

- name: must-browser-fetch
  category: must
  brief: "网页内容用 navigate + get-content，禁止 WebFetch"

- name: must-tool-priority
  category: must
  brief: "工具选择四层优先级：Recipe > frago命令 > 系统命令 > Claude工具"

- name: must-execution-principles
  category: must
  brief: "不假设意图、不停在计划、工具驱动、结果优先、建议而非擅自决定"

- name: must-workspace
  category: must
  brief: "产出物放 workspace、单 Run 排他、禁止 cd、路径用绝对路径"

- name: chrome-usage
  category: must
  brief: "chrome 操作完整指南：group 必选、导航规则、内容提取、交互、选择器、视觉辅助"

- name: must-no-auto-memory
  category: must
  brief: "禁用 Claude Code auto memory，结构化沉淀走 {{frago_launcher}} def save，忽略 MEMORY.md"

# 偏好类 — 有更好的方式
- name: better-structured-data
  category: better
  brief: "结构化数据存取用 {{frago_launcher}} def，比手写 JSON 更规范"

- name: better-git-checkout
  category: better
  brief: "git checkout 前先审视意图，部分撤销用 diff + Edit 精确还原"

- name: better-server-restart
  category: better
  brief: "server restart 前先检查活跃任务，有任务时禁止自行 --force"

- name: hook-rules-authoring
  category: better
  brief: "观察到重复路由模式时用 {{frago_launcher}} hook-rules add 沉淀为数据化规则，不改 Rust"

# 效率类 — 你可能不知道有这个
- name: recipe-execution
  category: available
  brief: "{{frago_launcher}} recipe list/run 查询和执行已有 recipe"

- name: interactive-recipe
  category: available
  brief: "Web UI 人机协作 Recipe 架构、launcher、API 交互、状态管理"

- name: recipe-authoring
  category: available
  brief: "Recipe 脚本编写规范：参数接收（sys.argv[1]/$1/__FRAGO_PARAMS__）、输出规范、代码模板"

- name: recipe-fields
  category: available
  brief: "Recipe 元数据必填/可选字段、flow/env 规范、validate 检查项"

- name: run-logging
  category: available
  brief: "自动/手动日志分工、_insights 强制记录、研究完成标准"

- name: recipe-spec-writing
  category: available
  brief: "Recipe spec 撰写规范：从需求到 spec.md 的结构化定义"

- name: recipe-creation
  category: available
  brief: "Recipe 创建规范：从 spec.md 到 recipe.md + 脚本的完整流程"

- name: def-knowledge
  category: available
  brief: "{{frago_launcher}} def 结构化知识系统：domain 注册、find 查询、save 沉淀"
