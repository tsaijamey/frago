<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>frago</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-window: #0d0e10;
    --primary: #25a83c;
    --primary-bright: #4fd56a;
    --primary-glow: #25a83c44;
    --primary-glow-soft: #25a83c1f;
    --danger: #ef5b5b;
    --text-primary: #eaecef;
    --text-secondary: #93989f;
    --text-muted: #5b6068;
    --text-faint: #2c2f35;
    --border: #1c1e22;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  }

  html, body {
    width: 100%;
    height: 100vh;
    background: var(--bg-window);
    color: var(--text-primary);
    font-family: var(--font-sans);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .body {
    width: 100%; height: 100vh;
    padding: 28px 28px 22px;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }

  /* ── Logo ───────────────────────────────────────────────── */
  .logo-wrap { margin-bottom: 18px; transition: opacity 200ms ease; }
  .logo-img { width: 56px; height: 56px; display: block; }
  .logo-wrap.dimmed { opacity: 0.4; }

  /* ── Center stage ──────────────────────────────────────── */
  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; gap: 18px;
  }

  .ring-wrap {
    position: relative;
    width: 76px; height: 76px;
  }
  .ring-track {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: border-color 300ms ease, opacity 300ms ease;
  }
  .ring-track.error {
    border-color: var(--danger);
    opacity: 0.5;
  }
  .ring-track.done {
    border-color: var(--primary);
    opacity: 0.4;
  }
  .ring-svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .ring-svg circle {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-dashoffset 200ms ease;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring-pct {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: var(--font-mono);
    letter-spacing: -0.5px;
  }
  .ring-spin {
    width: 18px; height: 18px;
    border: 2px solid var(--text-faint);
    border-top-color: var(--primary);
    border-right-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  .ring-spin.idle {
    border-top-color: var(--text-muted);
    border-right-color: var(--text-muted);
    animation: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ring-check {
    color: var(--primary-bright);
    font-size: 22px;
    font-weight: 700;
    line-height: 0.85;
  }
  .ring-cross {
    color: var(--danger);
    font-size: 22px;
    font-weight: 700;
    line-height: 0.85;
  }

  /* ── Status text ─────────────────────────────────────── */
  .status { min-height: 42px; }
  .status-line {
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 5px;
    font-weight: 500;
    transition: color 200ms ease;
  }
  .status-detail {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.2px;
    min-height: 16px;
  }

  /* ── Step dots ─────────────────────────────────────────── */
  .steps {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: auto;
  }
  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: all 280ms ease;
  }
  .step-dot.done {
    background: var(--primary);
  }
  .step-dot.running {
    background: var(--primary-bright);
    box-shadow: 0 0 8px var(--primary-glow);
    animation: dotpulse 1.4s ease-in-out infinite;
  }
  .step-dot.error {
    background: var(--danger);
    box-shadow: 0 0 6px #ef5b5b66;
  }
  @keyframes dotpulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ── Error toast ─────────────────────────────────────────── */
  .toast {
    position: fixed;
    left: 22px; right: 22px; bottom: 22px;
    background: #15090b;
    border: 1px solid var(--danger);
    border-radius: 7px;
    padding: 12px 14px;
    text-align: left;
    display: none;
    animation: slideUp 240ms ease;
  }
  .toast.visible { display: block; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast-title {
    font-size: 12px;
    color: var(--danger);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .toast-hint {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .toast-hint code {
    font-family: var(--font-mono);
    background: #220c0e;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-primary);
    font-size: 10px;
  }
  .toast-actions { display: flex; gap: 8px; }
  .btn {
    font-family: var(--font-sans);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid;
    cursor: pointer;
    background: transparent;
    font-weight: 500;
    transition: all 180ms ease;
  }
  .btn.primary {
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn.primary:hover { background: #ef5b5b18; }
  .btn.ghost {
    border-color: var(--border);
    color: var(--text-secondary);
  }
  .btn.ghost:hover {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="body">
  <div class="logo-wrap" id="logo-wrap">
    <img class="logo-img" src="logo.png" alt="frago">
  </div>

  <div class="stage">
    <div class="ring-wrap">
      <div class="ring-track" id="ring-track"></div>
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle id="ring-circle" cx="40" cy="40" r="38"
                stroke="#25a83c"
                stroke-dasharray="238.8"
                stroke-dashoffset="238.8"
                style="filter: drop-shadow(0 0 4px #25a83c66)"/>
      </svg>
      <div class="ring-center" id="ring-center">
        <div class="ring-spin idle"></div>
      </div>
    </div>
    <div class="status">
      <div class="status-line" id="status-line">Getting ready</div>
      <div class="status-detail" id="status-detail"></div>
    </div>
  </div>

  <div class="steps" id="steps">
    <div class="step-dot" data-step="uv"></div>
    <div class="step-dot" data-step="frago"></div>
    <div class="step-dot" data-step="claude"></div>
    <div class="step-dot" data-step="server"></div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-title" id="toast-title"></div>
  <div class="toast-hint" id="toast-hint"></div>
  <div class="toast-actions">
    <button class="btn primary" onclick="runBootstrap()">Try again</button>
    <button class="btn ghost" onclick="copyLog()">Copy log</button>
  </div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────
  const RING_CIRCUMFERENCE = 238.8; // 2 × π × 38
  const STEPS = ['uv', 'frago', 'claude', 'server'];

  // ── Tauri IPC ──────────────────────────────────────────
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;
  const { getCurrentWindow } = window.__TAURI__.window;
  const { LogicalSize } = window.__TAURI__.dpi;

  // ── DOM helpers ────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const logBuffer = [];

  function log(text) {
    logBuffer.push(text);
    // Cap the buffer so it can't grow unbounded
    if (logBuffer.length > 1000) logBuffer.splice(0, 500);
  }

  // ── Ring control ───────────────────────────────────────
  function setRingPercent(pct) {
    const offset = RING_CIRCUMFERENCE * (1 - Math.max(0, Math.min(100, pct)) / 100);
    $('ring-circle').style.strokeDashoffset = offset;
  }
  function ringIdle()    { $('ring-center').innerHTML = '<div class="ring-spin idle"></div>'; }
  function ringSpin()    { $('ring-center').innerHTML = '<div class="ring-spin"></div>'; }
  function ringPercent(p){ $('ring-center').innerHTML = `<div class="ring-pct">${Math.round(p)}%</div>`; }
  function ringCheck()   { $('ring-center').innerHTML = '<div class="ring-check">✓</div>'; }
  function ringCross()   { $('ring-center').innerHTML = '<div class="ring-cross">×</div>'; }

  function ringTrackState(state) {
    $('ring-track').className = 'ring-track' + (state ? ' ' + state : '');
  }

  // ── Step dot control ───────────────────────────────────
  function setStepDot(step, state) {
    const el = document.querySelector(`.step-dot[data-step="${step}"]`);
    el.className = 'step-dot' + (state ? ' ' + state : '');
  }
  function resetSteps() {
    STEPS.forEach(s => setStepDot(s, ''));
  }

  // ── Status text ────────────────────────────────────────
  function setStatus(line, detail) {
    $('status-line').textContent = line;
    $('status-detail').textContent = detail || '';
  }

  // ── Logo dim (during error) ────────────────────────────
  function setLogoDim(dim) {
    $('logo-wrap').className = 'logo-wrap' + (dim ? ' dimmed' : '');
  }

  // ── Format helpers ─────────────────────────────────────
  function fmtMb(bytes) {
    return (bytes / 1024 / 1024).toFixed(1);
  }
  function fmtSpeed(bps) {
    if (bps <= 0) return '';
    if (bps < 1024 * 1024) return `${(bps / 1024).toFixed(0)} KB/s`;
    return `${(bps / 1024 / 1024).toFixed(1)} MB/s`;
  }

  // ── Listen for Rust events ─────────────────────────────
  listen('bootstrap-log', (event) => {
    const { step, stream, line } = event.payload;
    log(`[${step}/${stream}] ${line}`);
  });

  listen('bootstrap-progress', (event) => {
    const { step, downloaded, total, bytes_per_sec } = event.payload;
    if (step !== 'claude_code') return;
    const pct = total > 0 ? (downloaded / total) * 100 : 0;
    setRingPercent(pct);
    ringPercent(pct);
    const speed = fmtSpeed(bytes_per_sec);
    const sizes = total > 0
      ? `${fmtMb(downloaded)} MB of ${fmtMb(total)} MB`
      : `${fmtMb(downloaded)} MB`;
    setStatus('Installing Claude Code', speed ? `${sizes} · ${speed}` : sizes);
  });

  // ── Friendly error mapping ─────────────────────────────
  // Maps raw Rust error + step + log buffer → human-friendly message.
  // Errors come from Rust as English, so we keep matching English.
  function friendlyError(rawMsg, failedStep) {
    const msg = String(rawMsg).toLowerCase();
    const logs = logBuffer.join('\n').toLowerCase();
    const haystack = msg + '\n' + logs;

    // Claude Code: SHA256 mismatch
    if (failedStep === 'claude' && haystack.includes('checksum mismatch')) {
      return {
        title: "Couldn't verify Claude Code",
        hint: 'The downloaded file appears corrupted. This is usually a transient network issue — try again.',
      };
    }

    // Claude Code: platform unsupported
    if (failedStep === 'claude' && (haystack.includes('not in manifest') || haystack.includes('unsupported os') || haystack.includes('unsupported arch'))) {
      return {
        title: 'Platform not supported',
        hint: "Your system isn't yet supported by frago. <br>Send us the log so we can help.",
      };
    }

    // Network errors
    const networkPatterns = [
      'could not resolve', 'connection refused', 'connection timed out',
      'network is unreachable', 'ssl', 'certificate', 'urlopen error',
      'temporary failure in name resolution', 'failed to connect',
      'no route to host', 'dns', 'tls', 'download interrupted',
      'download start failed', 'fetch latest failed', 'fetch manifest failed',
    ];
    if (networkPatterns.some(p => haystack.includes(p))) {
      return {
        title: 'Network connection failed',
        hint: 'Check your internet connection, then try again. <br>If you use a proxy, make sure it\'s running.',
      };
    }

    // Permission errors
    const permPatterns = ['permission denied', 'eacces', 'operation not permitted'];
    if (permPatterns.some(p => haystack.includes(p))) {
      return {
        title: 'Permission denied',
        hint: 'frago can\'t write to <code>~/.local/bin/</code>. <br>Check folder permissions and try again.',
      };
    }

    // Disk full
    if (haystack.includes('no space left') || haystack.includes('disk quota') || haystack.includes('read-only file system')) {
      return {
        title: 'Disk space low',
        hint: 'Free up some disk space and try again.',
      };
    }

    // Spawn / not found
    if (msg.includes('spawn failed') || msg.includes('not found') || msg.includes('no such file')) {
      if (failedStep === 'uv') {
        return {
          title: 'Missing curl',
          hint: '<code>curl</code> isn\'t installed. <br>macOS: <code>xcode-select --install</code> · Linux: <code>sudo apt install curl</code>',
        };
      }
      if (failedStep === 'frago') {
        return {
          title: "Can't find uv",
          hint: 'uv was just installed but isn\'t recognized yet. <br>Try restarting frago.',
        };
      }
      if (failedStep === 'claude') {
        return {
          title: "Can't find Claude Code",
          hint: 'Claude Code installer ran but the binary isn\'t where we expect. <br>Try restarting frago.',
        };
      }
      return {
        title: "Can't find frago",
        hint: 'frago isn\'t installed where we expect. <br>Try restarting the app.',
      };
    }

    // Server start failures
    if (failedStep === 'server') {
      if (msg.includes('failed to start server')) {
        return {
          title: "Couldn't start frago",
          hint: 'frago may not be installed correctly. <br>Try reinstalling: <code>uv tool install --force frago-cli</code>',
        };
      }
      if (msg.includes('90s') || msg.includes('timeout') || msg.includes('within')) {
        return {
          title: 'frago took too long to start',
          hint: 'Check the log at <code>~/.frago/server.log</code>, or see if port 8093 is in use.',
        };
      }
      return {
        title: "Couldn't start frago",
        hint: 'See <code>~/.frago/server.log</code> for details.',
      };
    }

    // Generic exit code
    if (msg.includes('exited with code')) {
      if (failedStep === 'uv') {
        return {
          title: "Couldn't install uv",
          hint: 'Network is the most common cause. Check connection, then try again.',
        };
      }
      if (failedStep === 'frago') {
        return {
          title: "Couldn't install frago",
          hint: 'Check your connection — PyPI access may be blocked.',
        };
      }
      if (failedStep === 'claude') {
        return {
          title: "Couldn't install Claude Code",
          hint: 'Tried 3 times. Check your connection and try again.',
        };
      }
      return {
        title: 'Setup failed',
        hint: 'See log for details.',
      };
    }

    // Fallback
    return {
      title: 'Setup failed',
      hint: 'Something went wrong while setting things up. <br>Try again, or send us the log.',
    };
  }

  function showError(rawMsg, failedStep) {
    const { title, hint } = friendlyError(rawMsg, failedStep);
    $('toast-title').textContent = title;
    $('toast-hint').innerHTML = hint;
    $('toast').classList.add('visible');
    log(`ERROR (${failedStep || 'unknown'}): ${rawMsg}`);
  }
  function hideError() {
    $('toast').classList.remove('visible');
  }
  function copyLog() {
    const text = logBuffer.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.toast-actions .ghost');
      const orig = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  // ── Window transition ──────────────────────────────────
  async function transitionToMainUI() {
    const win = getCurrentWindow();
    await win.setMinSize(new LogicalSize(800, 600));
    await win.setSize(new LogicalSize(1200, 800));
    await win.center();
    window.location.href = 'http://127.0.0.1:8093';
  }

  // ── Bootstrap flow ─────────────────────────────────────
  let runningStep = null;

  async function runBootstrap() {
    hideError();
    setLogoDim(false);
    resetSteps();
    ringTrackState(null);
    setRingPercent(0);
    ringIdle();
    setStatus('Getting ready', '');
    runningStep = null;

    try {
      // ── Step 1: uv ──
      runningStep = 'uv';
      setStepDot('uv', 'running');
      ringSpin();
      setStatus('Setting up tools', 'Checking uv…');

      const uv = await invoke('check_uv');
      if (uv.installed) {
        log(`uv ${uv.version || ''} found`);
      } else {
        setStatus('Setting up tools', 'Installing uv…');
        await invoke('install_uv');
      }
      setStepDot('uv', 'done');
      ringCheck();
      setRingPercent(100);

      // ── Step 2: frago-cli ──
      runningStep = 'frago';
      setStepDot('frago', 'running');
      setRingPercent(0);
      ringSpin();
      setStatus('Installing frago', '');

      const frago = await invoke('check_frago');
      if (frago.installed) {
        log(`frago-cli ${frago.version || ''} found`);
        setStatus('Installing frago', 'Checking for updates…');
      }
      await invoke('install_frago', { version: null });
      setStepDot('frago', 'done');
      ringCheck();
      setRingPercent(100);

      // ── Step 3: Claude Code ──
      runningStep = 'claude';
      setStepDot('claude', 'running');
      setRingPercent(0);
      ringSpin();
      setStatus('Installing Claude Code', 'Checking…');

      const claude = await invoke('check_claude_code');
      if (claude.installed) {
        log(`Claude Code ${claude.version || ''} found`);
        setStatus('Installing Claude Code', 'Already installed');
      } else {
        setStatus('Installing Claude Code', 'Connecting…');
        // install_claude_code emits bootstrap-progress events that update the
        // ring + status — see the listener above.
        await invoke('install_claude_code');
      }
      setStepDot('claude', 'done');
      ringCheck();
      setRingPercent(100);

      // ── Step 4: server ──
      runningStep = 'server';
      setStepDot('server', 'running');
      setRingPercent(0);
      ringSpin();
      setStatus('Starting frago', 'Launching…');

      const alreadyRunning = await invoke('check_server');
      if (alreadyRunning) {
        log('Server already running');
      } else {
        await invoke('start_server');
        setStatus('Starting frago', 'Waiting for server…');
        const ready = await invoke('wait_for_server', { timeoutMs: 90000 });
        if (!ready) {
          throw new Error('Server failed to start within 90s');
        }
      }
      setStepDot('server', 'done');
      ringCheck();
      setRingPercent(100);

      // ── Done ──
      setStatus('All set', 'Opening frago…');
      runningStep = null;
      await new Promise(r => setTimeout(r, 600));
      await transitionToMainUI();

    } catch (err) {
      const msg = typeof err === 'string' ? err : (err.message || String(err));
      const failedStep = runningStep;
      log(`FAIL ${failedStep}: ${msg}`);

      if (failedStep) {
        setStepDot(failedStep, 'error');
      }
      ringCross();
      ringTrackState('error');
      setLogoDim(true);
      setStatus('Setup failed', 'See details below');
      showError(msg, failedStep);
      runningStep = null;
    }
  }

  // Auto-start on load
  runBootstrap();
</script>

</body>
</html>
