<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>frago</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    user-select: none;
    -webkit-user-select: none;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fafafa;
  }

  .subtitle {
    font-size: 13px;
    color: #737373;
    margin-bottom: 24px;
  }

  .steps {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #a3a3a3;
  }

  .step .icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }

  .step.done { color: #22c55e; }
  .step.running { color: #e5e5e5; }
  .step.error { color: #ef4444; }

  .step.running .icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .terminal {
    width: 100%;
    max-width: 360px;
    height: 100px;
    background: #171717;
    border: 1px solid #262626;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 11px;
    color: #a3a3a3;
    overflow-y: auto;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .error-bar {
    display: none;
    width: 100%;
    max-width: 360px;
    margin-top: 12px;
    text-align: center;
  }

  .error-bar .msg {
    font-size: 12px;
    color: #ef4444;
    margin-bottom: 8px;
  }

  .error-bar button {
    background: #262626;
    color: #e5e5e5;
    border: 1px solid #404040;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
  }

  .error-bar button:hover { background: #333; }
</style>
</head>
<body>

<h1>frago</h1>
<p class="subtitle">Setting up your environment&hellip;</p>

<div class="steps">
  <div class="step" id="step-uv">
    <span class="icon">&bull;</span>
    <span class="label">uv (Python toolchain)</span>
  </div>
  <div class="step" id="step-frago">
    <span class="icon">&bull;</span>
    <span class="label">frago-cli</span>
  </div>
  <div class="step" id="step-server">
    <span class="icon">&bull;</span>
    <span class="label">Starting server</span>
  </div>
</div>

<div class="terminal" id="terminal"></div>

<div class="error-bar" id="error-bar">
  <div class="msg" id="error-msg"></div>
  <button onclick="runBootstrap()">Retry</button>
</div>

<script>
  // -----------------------------------------------------------------------
  // Helpers
  // -----------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const terminal = $('terminal');

  function log(text) {
    terminal.textContent += text + '\n';
    terminal.scrollTop = terminal.scrollHeight;
  }

  function setStep(id, state) {
    const el = $(id);
    el.className = 'step ' + state;
    const icons = { pending: '\u2022', running: '\u21BB', done: '\u2713', error: '\u2717' };
    el.querySelector('.icon').textContent = icons[state] || '\u2022';
  }

  function showError(msg) {
    $('error-msg').textContent = msg;
    $('error-bar').style.display = 'block';
  }

  function hideError() {
    $('error-bar').style.display = 'none';
  }

  // -----------------------------------------------------------------------
  // Tauri IPC
  // -----------------------------------------------------------------------
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;
  const { getCurrentWindow } = window.__TAURI__.window;
  const { LogicalSize } = window.__TAURI__.dpi;

  // Stream install output to terminal
  listen('bootstrap-log', (event) => {
    const { line } = event.payload;
    log(line);
  });

  // -----------------------------------------------------------------------
  // Bootstrap flow
  // -----------------------------------------------------------------------
  async function transitionToMainUI() {
    const win = getCurrentWindow();
    await win.setMinSize(new LogicalSize(800, 600));
    await win.setSize(new LogicalSize(1200, 800));
    await win.center();
    window.location.href = 'http://127.0.0.1:8093';
  }

  async function runBootstrap() {
    hideError();
    terminal.textContent = '';

    // Reset steps
    ['step-uv', 'step-frago', 'step-server'].forEach(id => setStep(id, 'pending'));

    try {
      // --- Step 1: uv ---
      setStep('step-uv', 'running');
      const uv = await invoke('check_uv');
      if (uv.installed) {
        log('uv ' + (uv.version || '') + ' found');
        setStep('step-uv', 'done');
      } else {
        log('Installing uv...');
        await invoke('install_uv');
        setStep('step-uv', 'done');
      }

      // --- Step 2: frago-cli ---
      setStep('step-frago', 'running');
      const frago = await invoke('check_frago');
      if (frago.installed) {
        log('frago-cli ' + (frago.version || '') + ' found');
        setStep('step-frago', 'done');
      } else {
        log('Installing frago-cli...');
        await invoke('install_frago', { version: null });
        setStep('step-frago', 'done');
      }

      // --- Step 3: server ---
      setStep('step-server', 'running');
      const alreadyRunning = await invoke('check_server');
      if (alreadyRunning) {
        log('Server already running');
      } else {
        await invoke('start_server');
        log('Waiting for server...');
        const ready = await invoke('wait_for_server', { timeoutMs: 90000 });
        if (!ready) {
          throw new Error('Server failed to start within 90s');
        }
      }
      setStep('step-server', 'done');

      // --- Done: transition ---
      log('Ready!');
      await new Promise(r => setTimeout(r, 500));
      await transitionToMainUI();

    } catch (err) {
      const msg = typeof err === 'string' ? err : (err.message || String(err));
      log('ERROR: ' + msg);

      // Mark current running step as error
      ['step-uv', 'step-frago', 'step-server'].forEach(id => {
        if ($(id).classList.contains('running')) setStep(id, 'error');
      });

      showError(msg);
    }
  }

  // Auto-start on load
  runBootstrap();
</script>

</body>
</html>
