<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>frago Knowledge Book</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<button class="menu-btn" id="menuBtn" aria-label="目录">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">f</div>
      <div>
        <div class="title">frago Knowledge Book</div>
        <div class="sub">agent OS · 知识手册</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="搜索命令 / Search…" autocomplete="off">
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main">
    <div class="page-head">
      <div class="crumb">CLI 参考 · CLI Reference</div>
      <h1>frago 命令行参考</h1>
      <p class="lede">frago 全部命令行入口的完整清单,中英文对照。英文取自 <code style="font-family:var(--mono)">frago --help</code> 原文,中文为对照译文,命令名保留原文。</p>
      <div class="meta-row">
        <span class="pill">version <b>0.49.1</b></span>
        <span class="pill">来源 <b>frago --help</b></span>
        <span class="pill">核实日期 <b>2026-05-24</b></span>
        <span class="pill" id="cmdCountPill">命令 <b>—</b></span>
      </div>
      <div class="legend">
        <span><i class="swatch swatch-group"></i>命令组 · 含子命令</span>
        <span><i class="swatch swatch-leaf"></i>直接命令 · 无子命令</span>
        <span class="legend-note">所列命令均已实现可用,颜色仅表层级。</span>
      </div>
    </div>

    <div id="content"></div>
    <div class="no-results" id="noResults">没有匹配的命令。No matching command.</div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
